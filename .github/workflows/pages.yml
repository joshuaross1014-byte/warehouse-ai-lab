name: Deploy warehouse-twin dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['warehouse-twin/docs/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: warehouse-twin/docs
      - id: deployment
        uses: actions/deploy-pages@v4
